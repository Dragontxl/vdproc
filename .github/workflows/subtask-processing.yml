name: Subtask Processing Workflow

on:
  repository_dispatch:
    types: [video-processing-subtask-generate-characters, video-processing-subtask-convert-frames, video-processing-subtask-generate-shots]
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Task ID'
        required: true
      phase:
        description: 'Phase'
        required: true
        type: choice
        options:
          - GENERATE_CHARACTERS
          - CONVERT_FRAMES
          - GENERATE_SHOTS
      subtask_index:
        description: 'Subtask Index'
        required: true
      gh_account_id:
        description: 'GitHub Account ID'
        required: true

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: ${{ inputs.task_id || github.event.client_payload.task_id }}-subtask-${{ inputs.phase || github.event.client_payload.phase }}-${{ inputs.subtask_index || github.event.client_payload.subtask_index }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ai-video-processor ./docker

      - name: Parse subtask data
        id: parse_subtask
        env:
          TASK_ID: ${{ inputs.task_id || github.event.client_payload.task_id }}
          PHASE: ${{ inputs.phase || github.event.client_payload.phase }}
          SUBTASK_INDEX: ${{ inputs.subtask_index || github.event.client_payload.subtask_index }}
          SUBTASK_TYPE: ${{ inputs.subtask_type || github.event.client_payload.subtask_type }}
          INPUT_PATH: ${{ inputs.input_path || github.event.client_payload.input_path }}
          METADATA: ${{ inputs.metadata || github.event.client_payload.metadata }}
          CONFIG_JSON: ${{ inputs.config || github.event.client_payload.config || '{}' }}
        run: |
          echo "TASK_ID=$TASK_ID" >> $GITHUB_OUTPUT
          echo "PHASE=$PHASE" >> $GITHUB_OUTPUT
          echo "SUBTASK_INDEX=$SUBTASK_INDEX" >> $GITHUB_OUTPUT
          echo "SUBTASK_TYPE=$SUBTASK_TYPE" >> $GITHUB_OUTPUT
          echo "INPUT_PATH=$INPUT_PATH" >> $GITHUB_OUTPUT
          echo "METADATA=$METADATA" >> $GITHUB_OUTPUT
          
          VIDEO_PATH=$(echo "$CONFIG_JSON" | jq -r '.video_path // ""')
          FPS=$(echo "$CONFIG_JSON" | jq -r '.fps // 30')
          PROMPT=$(echo "$CONFIG_JSON" | jq -r '.prompt // ""')
          OUTPUT_FPS=$(echo "$CONFIG_JSON" | jq -r '.output_fps // 24')
          
          echo "VIDEO_PATH=$VIDEO_PATH" >> $GITHUB_OUTPUT
          echo "FPS=$FPS" >> $GITHUB_OUTPUT
          echo "PROMPT=$PROMPT" >> $GITHUB_OUTPUT
          echo "OUTPUT_FPS=$OUTPUT_FPS" >> $GITHUB_OUTPUT

      - name: Run character generation subtask
        if: ${{ steps.parse_subtask.outputs.PHASE == 'GENERATE_CHARACTERS' }}
        env:
          TASK_ID: ${{ steps.parse_subtask.outputs.TASK_ID }}
          SUBTASK_INDEX: ${{ steps.parse_subtask.outputs.SUBTASK_INDEX }}
          SUBTASK_TYPE: ${{ steps.parse_subtask.outputs.SUBTASK_TYPE }}
          INPUT_PATH: ${{ steps.parse_subtask.outputs.INPUT_PATH }}
          METADATA: ${{ steps.parse_subtask.outputs.METADATA }}
          VIDEO_PATH: ${{ steps.parse_subtask.outputs.VIDEO_PATH }}
          PROMPT: ${{ steps.parse_subtask.outputs.PROMPT }}
          GH_ACCOUNT_ID: ${{ inputs.gh_account_id || github.event.client_payload.gh_account_id }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          CALLBACK_URL: ${{ secrets.CALLBACK_URL }}
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_ACCOUNTS: ${{ secrets.AI_ACCOUNTS }}
        run: |
          docker run --rm \
            -e TASK_ID="$TASK_ID" \
            -e SUBTASK_INDEX="$SUBTASK_INDEX" \
            -e SUBTASK_TYPE="$SUBTASK_TYPE" \
            -e INPUT_PATH="$INPUT_PATH" \
            -e METADATA="$METADATA" \
            -e VIDEO_PATH="$VIDEO_PATH" \
            -e PROMPT="$PROMPT" \
            -e GH_ACCOUNT_ID="$GH_ACCOUNT_ID" \
            -e R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
            -e R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
            -e R2_ENDPOINT_URL="$R2_ENDPOINT_URL" \
            -e R2_BUCKET_NAME="$R2_BUCKET_NAME" \
            -e CALLBACK_URL="$CALLBACK_URL" \
            -e CALLBACK_SECRET="$CALLBACK_SECRET" \
            -e BACKEND_API_KEY="$BACKEND_API_KEY" \
            -e AI_API_KEY="$AI_API_KEY" \
            -e AI_BASE_URL="$AI_BASE_URL" \
            -e AI_ACCOUNTS="$AI_ACCOUNTS" \
            -e MAX_CONCURRENT=1 \
            ai-video-processor \
            bash /scripts/generate-characters.sh

      - name: Run frame conversion subtask
        if: ${{ steps.parse_subtask.outputs.PHASE == 'CONVERT_FRAMES' }}
        env:
          TASK_ID: ${{ steps.parse_subtask.outputs.TASK_ID }}
          SUBTASK_INDEX: ${{ steps.parse_subtask.outputs.SUBTASK_INDEX }}
          SUBTASK_TYPE: ${{ steps.parse_subtask.outputs.SUBTASK_TYPE }}
          INPUT_PATH: ${{ steps.parse_subtask.outputs.INPUT_PATH }}
          METADATA: ${{ steps.parse_subtask.outputs.METADATA }}
          VIDEO_PATH: ${{ steps.parse_subtask.outputs.VIDEO_PATH }}
          PROMPT: ${{ steps.parse_subtask.outputs.PROMPT }}
          GH_ACCOUNT_ID: ${{ inputs.gh_account_id || github.event.client_payload.gh_account_id }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          CALLBACK_URL: ${{ secrets.CALLBACK_URL }}
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_ACCOUNTS: ${{ secrets.AI_ACCOUNTS }}
        run: |
          docker run --rm \
            -e TASK_ID="$TASK_ID" \
            -e SUBTASK_INDEX="$SUBTASK_INDEX" \
            -e SUBTASK_TYPE="$SUBTASK_TYPE" \
            -e INPUT_PATH="$INPUT_PATH" \
            -e METADATA="$METADATA" \
            -e VIDEO_PATH="$VIDEO_PATH" \
            -e PROMPT="$PROMPT" \
            -e GH_ACCOUNT_ID="$GH_ACCOUNT_ID" \
            -e R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
            -e R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
            -e R2_ENDPOINT_URL="$R2_ENDPOINT_URL" \
            -e R2_BUCKET_NAME="$R2_BUCKET_NAME" \
            -e CALLBACK_URL="$CALLBACK_URL" \
            -e CALLBACK_SECRET="$CALLBACK_SECRET" \
            -e BACKEND_API_KEY="$BACKEND_API_KEY" \
            -e AI_API_KEY="$AI_API_KEY" \
            -e AI_BASE_URL="$AI_BASE_URL" \
            -e AI_ACCOUNTS="$AI_ACCOUNTS" \
            -e MAX_CONCURRENT=1 \
            ai-video-processor \
            bash /scripts/convert-frames.sh

      - name: Run shot generation subtask
        if: ${{ steps.parse_subtask.outputs.PHASE == 'GENERATE_SHOTS' }}
        env:
          TASK_ID: ${{ steps.parse_subtask.outputs.TASK_ID }}
          SUBTASK_INDEX: ${{ steps.parse_subtask.outputs.SUBTASK_INDEX }}
          SUBTASK_TYPE: ${{ steps.parse_subtask.outputs.SUBTASK_TYPE }}
          INPUT_PATH: ${{ steps.parse_subtask.outputs.INPUT_PATH }}
          METADATA: ${{ steps.parse_subtask.outputs.METADATA }}
          VIDEO_PATH: ${{ steps.parse_subtask.outputs.VIDEO_PATH }}
          OUTPUT_FPS: ${{ steps.parse_subtask.outputs.OUTPUT_FPS }}
          GH_ACCOUNT_ID: ${{ inputs.gh_account_id || github.event.client_payload.gh_account_id }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          CALLBACK_URL: ${{ secrets.CALLBACK_URL }}
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_ACCOUNTS: ${{ secrets.AI_ACCOUNTS }}
        run: |
          docker run --rm \
            -e TASK_ID="$TASK_ID" \
            -e SUBTASK_INDEX="$SUBTASK_INDEX" \
            -e SUBTASK_TYPE="$SUBTASK_TYPE" \
            -e INPUT_PATH="$INPUT_PATH" \
            -e METADATA="$METADATA" \
            -e VIDEO_PATH="$VIDEO_PATH" \
            -e OUTPUT_FPS="$OUTPUT_FPS" \
            -e GH_ACCOUNT_ID="$GH_ACCOUNT_ID" \
            -e R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
            -e R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
            -e R2_ENDPOINT_URL="$R2_ENDPOINT_URL" \
            -e R2_BUCKET_NAME="$R2_BUCKET_NAME" \
            -e CALLBACK_URL="$CALLBACK_URL" \
            -e CALLBACK_SECRET="$CALLBACK_SECRET" \
            -e BACKEND_API_KEY="$BACKEND_API_KEY" \
            -e AI_API_KEY="$AI_API_KEY" \
            -e AI_BASE_URL="$AI_BASE_URL" \
            -e AI_ACCOUNTS="$AI_ACCOUNTS" \
            -e MAX_CONCURRENT=1 \
            ai-video-processor \
            bash /scripts/generate-shots.sh

      - name: Notify subtask completion
        if: always()
        env:
          TASK_ID: ${{ steps.parse_subtask.outputs.TASK_ID }}
          PHASE: ${{ steps.parse_subtask.outputs.PHASE }}
          SUBTASK_INDEX: ${{ steps.parse_subtask.outputs.SUBTASK_INDEX }}
          STATUS: ${{ job.status }}
          CALLBACK_URL: ${{ secrets.CALLBACK_URL }}
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
        run: |
          STATUS_TO_SET="FAILED"
          if [ "$STATUS" = "success" ]; then
            STATUS_TO_SET="COMPLETED"
          fi
          
          curl -s --connect-timeout 10 --max-time 30 -X POST "$CALLBACK_URL/subtask/update" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Signature: $CALLBACK_SECRET" \
            -d "{\"task_id\":\"$TASK_ID\",\"phase\":\"$PHASE\",\"subtask_index\":$SUBTASK_INDEX,\"status\":\"$STATUS_TO_SET\"}"