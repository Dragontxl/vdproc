name: Video Processing Workflow

on:
  repository_dispatch:
    types: [video-processing-detect, video-processing-analyze, video-processing-select-faces, video-processing-generate-characters, video-processing-crop-shots, video-processing-convert-frames, video-processing-generate-shots, video-processing-compose]
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Task ID'
        required: true
      start_phase:
        description: 'Starting phase'
        required: true
        type: choice
        options:
          - DETECT
          - ANALYZE
          - SELECT_FACES
          - GENERATE_CHARACTERS
          - CROP_SHOTS
          - CONVERT_FRAMES
          - GENERATE_SHOTS
          - COMPOSE
      end_phase:
        description: 'Ending phase'
        required: true
        type: choice
        options:
          - DETECT
          - ANALYZE
          - SELECT_FACES
          - GENERATE_CHARACTERS
          - CROP_SHOTS
          - CONVERT_FRAMES
          - GENERATE_SHOTS
          - COMPOSE
      gh_account_id:
        description: 'GitHub Account ID'
        required: true
      ai_account_id:
        description: 'AI Account ID'
        required: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    concurrency:
      group: ${{ inputs.task_id || github.event.client_payload.task_id }}-${{ inputs.start_phase || github.event.client_payload.start_phase || inputs.phase || github.event.client_payload.phase }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ai-video-processor ./docker

      - name: Set phase order variables
        id: get_phase_order
        run: |
          declare -A phase_map=(
            ["DETECT"]=0
            ["ANALYZE"]=1
            ["SELECT_FACES"]=2
            ["GENERATE_CHARACTERS"]=3
            ["CROP_SHOTS"]=4
            ["CONVERT_FRAMES"]=5
            ["GENERATE_SHOTS"]=6
            ["COMPOSE"]=7
          )
          
          start_phase=${{ inputs.start_phase || github.event.client_payload.start_phase || inputs.phase || github.event.client_payload.phase }}
          end_phase=${{ inputs.end_phase || github.event.client_payload.end_phase || inputs.phase || github.event.client_payload.phase }}
          
          start=${phase_map[$start_phase]}
          end=${phase_map[$end_phase]}
          
          echo "start=$start" >> $GITHUB_OUTPUT
          echo "end=$end" >> $GITHUB_OUTPUT
          
          for phase in "${!phase_map[@]}"; do
            echo "${phase,,}=$((phase_map[$phase]))" >> $GITHUB_OUTPUT
          done

      - name: Run shot detection phase
        if: ${{ steps.get_phase_order.outputs.detect >= steps.get_phase_order.outputs.start && steps.get_phase_order.outputs.detect <= steps.get_phase_order.outputs.end }}
        env:
          TASK_ID: ${{ inputs.task_id || github.event.client_payload.task_id }}
          GH_ACCOUNT_ID: ${{ inputs.gh_account_id || github.event.client_payload.gh_account_id }}
          VIDEO_PATH: ${{ inputs.video_path || github.event.client_payload.video_path }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          CALLBACK_URL: ${{ secrets.CALLBACK_URL }}
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
        run: |
          docker run --rm \
            -e TASK_ID="$TASK_ID" \
            -e GH_ACCOUNT_ID="$GH_ACCOUNT_ID" \
            -e VIDEO_PATH="$VIDEO_PATH" \
            -e R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
            -e R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
            -e R2_ENDPOINT_URL="$R2_ENDPOINT_URL" \
            -e R2_BUCKET_NAME="$R2_BUCKET_NAME" \
            -e CALLBACK_URL="$CALLBACK_URL" \
            -e CALLBACK_SECRET="$CALLBACK_SECRET" \
            -e BACKEND_API_KEY="$BACKEND_API_KEY" \
            ai-video-processor \
            bash /scripts/detect-shots.sh

      - name: Run scene analysis phase
        if: ${{ steps.get_phase_order.outputs.analyze >= steps.get_phase_order.outputs.start && steps.get_phase_order.outputs.analyze <= steps.get_phase_order.outputs.end }}
        env:
          TASK_ID: ${{ inputs.task_id || github.event.client_payload.task_id }}
          GH_ACCOUNT_ID: ${{ inputs.gh_account_id || github.event.client_payload.gh_account_id }}
          AI_ACCOUNT_ID: ${{ inputs.ai_account_id || github.event.client_payload.ai_account_id }}
          VIDEO_PATH: ${{ inputs.video_path || github.event.client_payload.video_path }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          CALLBACK_URL: ${{ secrets.CALLBACK_URL }}
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          AI_API_KEY: ${{ inputs.ai_api_key || github.event.client_payload.ai_api_key || secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ inputs.ai_base_url || github.event.client_payload.ai_base_url || secrets.AI_BASE_URL }}
        run: |
          docker run --rm \
            -e TASK_ID="$TASK_ID" \
            -e GH_ACCOUNT_ID="$GH_ACCOUNT_ID" \
            -e AI_ACCOUNT_ID="$AI_ACCOUNT_ID" \
            -e VIDEO_PATH="$VIDEO_PATH" \
            -e R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
            -e R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
            -e R2_ENDPOINT_URL="$R2_ENDPOINT_URL" \
            -e R2_BUCKET_NAME="$R2_BUCKET_NAME" \
            -e CALLBACK_URL="$CALLBACK_URL" \
            -e CALLBACK_SECRET="$CALLBACK_SECRET" \
            -e BACKEND_API_KEY="$BACKEND_API_KEY" \
            -e AI_API_KEY="$AI_API_KEY" \
            -e AI_BASE_URL="$AI_BASE_URL" \
            ai-video-processor \
            bash /scripts/analyze-scene.sh

      - name: Run face selection phase
        if: ${{ steps.get_phase_order.outputs.select_faces >= steps.get_phase_order.outputs.start && steps.get_phase_order.outputs.select_faces <= steps.get_phase_order.outputs.end }}
        env:
          TASK_ID: ${{ inputs.task_id || github.event.client_payload.task_id }}
          GH_ACCOUNT_ID: ${{ inputs.gh_account_id || github.event.client_payload.gh_account_id }}
          VIDEO_PATH: ${{ inputs.video_path || github.event.client_payload.video_path }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          CALLBACK_URL: ${{ secrets.CALLBACK_URL }}
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
        run: |
          docker run --rm \
            -e TASK_ID="$TASK_ID" \
            -e GH_ACCOUNT_ID="$GH_ACCOUNT_ID" \
            -e VIDEO_PATH="$VIDEO_PATH" \
            -e R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
            -e R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
            -e R2_ENDPOINT_URL="$R2_ENDPOINT_URL" \
            -e R2_BUCKET_NAME="$R2_BUCKET_NAME" \
            -e CALLBACK_URL="$CALLBACK_URL" \
            -e CALLBACK_SECRET="$CALLBACK_SECRET" \
            -e BACKEND_API_KEY="$BACKEND_API_KEY" \
            ai-video-processor \
            bash /scripts/select-faces.sh

      - name: Run character generation phase
        if: ${{ steps.get_phase_order.outputs.generate_characters >= steps.get_phase_order.outputs.start && steps.get_phase_order.outputs.generate_characters <= steps.get_phase_order.outputs.end }}
        env:
          TASK_ID: ${{ inputs.task_id || github.event.client_payload.task_id }}
          GH_ACCOUNT_ID: ${{ inputs.gh_account_id || github.event.client_payload.gh_account_id }}
          AI_ACCOUNT_ID: ${{ inputs.ai_account_id || github.event.client_payload.ai_account_id }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          CALLBACK_URL: ${{ secrets.CALLBACK_URL }}
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          AI_API_KEY: ${{ inputs.ai_api_key || github.event.client_payload.ai_api_key || secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ inputs.ai_base_url || github.event.client_payload.ai_base_url || secrets.AI_BASE_URL }}
          AI_ACCOUNTS: ${{ inputs.ai_accounts || github.event.client_payload.ai_accounts }}
          COOLDOWN_SECONDS: ${{ inputs.cooldown_seconds || github.event.client_payload.cooldown_seconds || 1 }}
          MAX_CONCURRENT: ${{ inputs.max_concurrent || github.event.client_payload.max_concurrent || 2 }}
        run: |
          docker run --rm \
            -e TASK_ID="$TASK_ID" \
            -e GH_ACCOUNT_ID="$GH_ACCOUNT_ID" \
            -e AI_ACCOUNT_ID="$AI_ACCOUNT_ID" \
            -e R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
            -e R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
            -e R2_ENDPOINT_URL="$R2_ENDPOINT_URL" \
            -e R2_BUCKET_NAME="$R2_BUCKET_NAME" \
            -e CALLBACK_URL="$CALLBACK_URL" \
            -e CALLBACK_SECRET="$CALLBACK_SECRET" \
            -e BACKEND_API_KEY="$BACKEND_API_KEY" \
            -e AI_API_KEY="$AI_API_KEY" \
            -e AI_BASE_URL="$AI_BASE_URL" \
            -e AI_ACCOUNTS="$AI_ACCOUNTS" \
            -e COOLDOWN_SECONDS="$COOLDOWN_SECONDS" \
            -e MAX_CONCURRENT="$MAX_CONCURRENT" \
            ai-video-processor \
            bash /scripts/generate-characters.sh

      - name: Run shot cropping phase
        if: ${{ steps.get_phase_order.outputs.crop_shots >= steps.get_phase_order.outputs.start && steps.get_phase_order.outputs.crop_shots <= steps.get_phase_order.outputs.end }}
        env:
          TASK_ID: ${{ inputs.task_id || github.event.client_payload.task_id }}
          GH_ACCOUNT_ID: ${{ inputs.gh_account_id || github.event.client_payload.gh_account_id }}
          VIDEO_PATH: ${{ inputs.video_path || github.event.client_payload.video_path }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          CALLBACK_URL: ${{ secrets.CALLBACK_URL }}
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
        run: |
          docker run --rm \
            -e TASK_ID="$TASK_ID" \
            -e GH_ACCOUNT_ID="$GH_ACCOUNT_ID" \
            -e VIDEO_PATH="$VIDEO_PATH" \
            -e R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
            -e R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
            -e R2_ENDPOINT_URL="$R2_ENDPOINT_URL" \
            -e R2_BUCKET_NAME="$R2_BUCKET_NAME" \
            -e CALLBACK_URL="$CALLBACK_URL" \
            -e CALLBACK_SECRET="$CALLBACK_SECRET" \
            -e BACKEND_API_KEY="$BACKEND_API_KEY" \
            ai-video-processor \
            bash /scripts/crop-shots.sh

      - name: Run frame conversion phase
        if: ${{ steps.get_phase_order.outputs.convert_frames >= steps.get_phase_order.outputs.start && steps.get_phase_order.outputs.convert_frames <= steps.get_phase_order.outputs.end }}
        env:
          TASK_ID: ${{ inputs.task_id || github.event.client_payload.task_id }}
          GH_ACCOUNT_ID: ${{ inputs.gh_account_id || github.event.client_payload.gh_account_id }}
          AI_ACCOUNT_ID: ${{ inputs.ai_account_id || github.event.client_payload.ai_account_id }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          CALLBACK_URL: ${{ secrets.CALLBACK_URL }}
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          AI_API_KEY: ${{ inputs.ai_api_key || github.event.client_payload.ai_api_key || secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ inputs.ai_base_url || github.event.client_payload.ai_base_url || secrets.AI_BASE_URL }}
          AI_ACCOUNTS: ${{ inputs.ai_accounts || github.event.client_payload.ai_accounts }}
          COOLDOWN_SECONDS: ${{ inputs.cooldown_seconds || github.event.client_payload.cooldown_seconds || 1 }}
          MAX_CONCURRENT: ${{ inputs.max_concurrent || github.event.client_payload.max_concurrent || 2 }}
          PROMPT: ${{ inputs.prompt || github.event.client_payload.prompt || '' }}
        run: |
          docker run --rm \
            -e TASK_ID="$TASK_ID" \
            -e GH_ACCOUNT_ID="$GH_ACCOUNT_ID" \
            -e AI_ACCOUNT_ID="$AI_ACCOUNT_ID" \
            -e R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
            -e R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
            -e R2_ENDPOINT_URL="$R2_ENDPOINT_URL" \
            -e R2_BUCKET_NAME="$R2_BUCKET_NAME" \
            -e CALLBACK_URL="$CALLBACK_URL" \
            -e CALLBACK_SECRET="$CALLBACK_SECRET" \
            -e BACKEND_API_KEY="$BACKEND_API_KEY" \
            -e AI_API_KEY="$AI_API_KEY" \
            -e AI_BASE_URL="$AI_BASE_URL" \
            -e AI_ACCOUNTS="$AI_ACCOUNTS" \
            -e COOLDOWN_SECONDS="$COOLDOWN_SECONDS" \
            -e MAX_CONCURRENT="$MAX_CONCURRENT" \
            -e PROMPT="$PROMPT" \
            ai-video-processor \
            bash /scripts/convert-frames.sh

      - name: Run shot generation phase
        if: ${{ steps.get_phase_order.outputs.generate_shots >= steps.get_phase_order.outputs.start && steps.get_phase_order.outputs.generate_shots <= steps.get_phase_order.outputs.end }}
        env:
          TASK_ID: ${{ inputs.task_id || github.event.client_payload.task_id }}
          GH_ACCOUNT_ID: ${{ inputs.gh_account_id || github.event.client_payload.gh_account_id }}
          AI_ACCOUNT_ID: ${{ inputs.ai_account_id || github.event.client_payload.ai_account_id }}
          OUTPUT_FPS: ${{ inputs.output_fps || github.event.client_payload.output_fps || 24 }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          CALLBACK_URL: ${{ secrets.CALLBACK_URL }}
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          AI_API_KEY: ${{ inputs.ai_api_key || github.event.client_payload.ai_api_key || secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ inputs.ai_base_url || github.event.client_payload.ai_base_url || secrets.AI_BASE_URL }}
          AI_ACCOUNTS: ${{ inputs.ai_accounts || github.event.client_payload.ai_accounts }}
          COOLDOWN_SECONDS: ${{ inputs.cooldown_seconds || github.event.client_payload.cooldown_seconds || 2 }}
          MAX_CONCURRENT: ${{ inputs.max_concurrent || github.event.client_payload.max_concurrent || 2 }}
        run: |
          docker run --rm \
            -e TASK_ID="$TASK_ID" \
            -e GH_ACCOUNT_ID="$GH_ACCOUNT_ID" \
            -e AI_ACCOUNT_ID="$AI_ACCOUNT_ID" \
            -e OUTPUT_FPS="$OUTPUT_FPS" \
            -e R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
            -e R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
            -e R2_ENDPOINT_URL="$R2_ENDPOINT_URL" \
            -e R2_BUCKET_NAME="$R2_BUCKET_NAME" \
            -e CALLBACK_URL="$CALLBACK_URL" \
            -e CALLBACK_SECRET="$CALLBACK_SECRET" \
            -e BACKEND_API_KEY="$BACKEND_API_KEY" \
            -e AI_API_KEY="$AI_API_KEY" \
            -e AI_BASE_URL="$AI_BASE_URL" \
            -e AI_ACCOUNTS="$AI_ACCOUNTS" \
            -e COOLDOWN_SECONDS="$COOLDOWN_SECONDS" \
            -e MAX_CONCURRENT="$MAX_CONCURRENT" \
            ai-video-processor \
            bash /scripts/generate-shots.sh

      - name: Run composition phase
        if: ${{ steps.get_phase_order.outputs.compose >= steps.get_phase_order.outputs.start && steps.get_phase_order.outputs.compose <= steps.get_phase_order.outputs.end }}
        env:
          TASK_ID: ${{ inputs.task_id || github.event.client_payload.task_id }}
          GH_ACCOUNT_ID: ${{ inputs.gh_account_id || github.event.client_payload.gh_account_id }}
          OUTPUT_FPS: ${{ inputs.output_fps || github.event.client_payload.output_fps || 24 }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          CALLBACK_URL: ${{ secrets.CALLBACK_URL }}
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
        run: |
          docker run --rm \
            -e TASK_ID="$TASK_ID" \
            -e GH_ACCOUNT_ID="$GH_ACCOUNT_ID" \
            -e OUTPUT_FPS="$OUTPUT_FPS" \
            -e R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
            -e R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
            -e R2_ENDPOINT_URL="$R2_ENDPOINT_URL" \
            -e R2_BUCKET_NAME="$R2_BUCKET_NAME" \
            -e CALLBACK_URL="$CALLBACK_URL" \
            -e CALLBACK_SECRET="$CALLBACK_SECRET" \
            -e BACKEND_API_KEY="$BACKEND_API_KEY" \
            ai-video-processor \
            bash /scripts/compose-video.sh

      - name: Notify completion
        if: always()
        env:
          TASK_ID: ${{ inputs.task_id || github.event.client_payload.task_id }}
          STATUS: ${{ job.status }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          CALLBACK_URL: ${{ secrets.CALLBACK_URL }}
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
          PHASE: ${{ inputs.start_phase || github.event.client_payload.start_phase || inputs.phase || github.event.client_payload.phase }}
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=5
          SUCCESS=0
          
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $attempt/$MAX_RETRIES to notify completion..."
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "$CALLBACK_URL/github" \
              -H "Content-Type: application/json" \
              -H "X-Callback-Signature: $CALLBACK_SECRET" \
              -d "{
                \"task_id\": \"$TASK_ID\",
                \"status\": \"$STATUS\",
                \"run_id\": \"$RUN_ID\",
                \"run_number\": \"$RUN_NUMBER\",
                \"phase\": \"$PHASE\"
              }")
            
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | head -n -1)
            
            echo "Completion callback response code: $HTTP_CODE"
            echo "Completion callback response body: $BODY"
            
            if [ "$HTTP_CODE" -eq 200 ]; then
              SUCCESS=1
              break
            fi
            
            if [ "$attempt" -lt "$MAX_RETRIES" ]; then
              echo "Completion notification failed, retrying in $RETRY_DELAY seconds..."
              sleep $RETRY_DELAY
            fi
          done
          
          if [ $SUCCESS -ne 1 ]; then
            echo "ERROR: Failed to notify completion after $MAX_RETRIES attempts"
            exit 1
          fi