name = "ai-video-worker"
main = "src/index.ts"
compatibility_date = "2024-05-29"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "ai-video-worker"
main = "src/index.ts"

[env.production.vars]
ADMIN_API_KEY = "${ADMIN_API_KEY}"
CALLBACK_SECRET = "${CALLBACK_SECRET}"
ENCRYPTION_KEY = "${ENCRYPTION_KEY}"
JWT_SECRET = "${JWT_SECRET}"
ENVIRONMENT = "production"
GITHUB_REPO_OWNER = "Dragontxl"
GITHUB_REPO_NAME = "ai-video-process"
FRONTEND_URL = "${FRONTEND_URL}"
ADMIN_URL = "${ADMIN_URL}"

[[env.production.d1_databases]]
binding = "DB"
database_name = "ai-video-db"
database_id = "${D1_DATABASE_ID}"

[[env.production.r2_buckets]]
binding = "R2"
bucket_name = "ai-video-bucket"

[[env.production.kv_namespaces]]
binding = "KV"
id = "${KV_NAMESPACE_ID}"

[vars]
ADMIN_API_KEY = "${ADMIN_API_KEY}"
CALLBACK_SECRET = "${CALLBACK_SECRET}"
ENCRYPTION_KEY = "${ENCRYPTION_KEY}"
JWT_SECRET = "${JWT_SECRET}"
ENVIRONMENT = "production"
GITHUB_REPO_OWNER = "Dragontxl"
GITHUB_REPO_NAME = "ai-video-process"
FRONTEND_URL = "${FRONTEND_URL}"
ADMIN_URL = "${ADMIN_URL}"

[[d1_databases]]
binding = "DB"
database_name = "ai-video-db"
database_id = "${D1_DATABASE_ID}"

[[r2_buckets]]
binding = "R2"
bucket_name = "ai-video-bucket"

[[kv_namespaces]]
binding = "KV"
id = "${KV_NAMESPACE_ID}"
